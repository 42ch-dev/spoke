name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - iteration/**

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-codegen:
    name: verify-codegen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: spoke-rust
          workspaces: .

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify codegen output
        run: pnpm run verify-codegen

  typescript:
    name: typescript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck @42ch/spoke-schemas
        run: pnpm -F @42ch/spoke-schemas typecheck

      - name: Build @42ch/spoke-schemas
        run: pnpm -F @42ch/spoke-schemas build

      - name: Typecheck @42ch/spoke-operations
        run: pnpm -F @42ch/spoke-operations typecheck

      - name: Test @42ch/spoke-operations
        run: pnpm -F @42ch/spoke-operations test

      - name: Build @42ch/spoke-operations
        run: pnpm -F @42ch/spoke-operations build

  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: spoke-rust
          workspaces: .

      - name: Check spoke-schemas crate
        run: cargo check -p spoke-schemas
